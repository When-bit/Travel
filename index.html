    // 地点坐标（用于实时天气）
    const locationCoords = {
        "伊宁": { lat: 43.909, lon: 81.317 },
        "赛里木湖": { lat: 44.589, lon: 81.163 },
        "喀拉峻": { lat: 43.083, lon: 82.217 },
        "琼库什台": { lat: 43.059, lon: 81.996 },
        "巩留": { lat: 43.483, lon: 82.233 },
        "库尔德宁": { lat: 43.253, lon: 82.616 },
        "那拉提": { lat: 43.278, lon: 84.115 }
    };
    const OPENWEATHER_API_KEY = "0262ad06edbf51576a9467075329c784";  // 您的API key

    // 辅助函数：获取单个地点的天气
    async function fetchWeather(city, lat, lon) {
        const url = `https://api.openweathermap.org/data/2.5/weather?lat=${lat}&lon=${lon}&appid=${OPENWEATHER_API_KEY}&units=metric&lang=zh_cn`;
        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();
            if (data.main && data.weather) {
                return {
                    temp: `${Math.round(data.main.temp_min)}~${Math.round(data.main.temp_max)}°C`,
                    desc: data.weather[0].description,
                    iconCode: data.weather[0].icon
                };
            }
        } catch (error) {
            console.warn(`获取 ${city} 天气失败:`, error);
        }
        return null;
    }

    // 渲染实时天气（异步）
    async function renderWeather() {
        const container = document.getElementById('weatherGuide');
        container.innerHTML = '<div class="text-center" style="grid-column:1/-1;">⏳ 正在获取实时天气...</div>';
        
        // 按顺序请求（伊宁、赛湖、喀拉峻、琼库、巩留、库尔德宁、那拉提）
        const orderedCities = ["伊宁", "赛里木湖", "喀拉峻", "琼库什台", "巩留", "库尔德宁", "那拉提"];
        const weatherResults = [];
        for (let city of orderedCities) {
            const coord = locationCoords[city];
            if (coord) {
                const weather = await fetchWeather(city, coord.lat, coord.lon);
                weatherResults.push({ city, weather });
            } else {
                weatherResults.push({ city, weather: null });
            }
        }
        
        // 生成卡片HTML
        let html = '';
        for (let item of weatherResults) {
            const w = item.weather;
            let iconHtml = '<i class="fas fa-cloud"></i>';
            if (w) {
                // 根据天气代码简单映射FontAwesome图标
                const code = w.iconCode;
                if (code.includes('01')) iconHtml = '<i class="fas fa-sun"></i>';
                else if (code.includes('02')) iconHtml = '<i class="fas fa-cloud-sun"></i>';
                else if (code.includes('03') || code.includes('04')) iconHtml = '<i class="fas fa-cloud"></i>';
                else if (code.includes('09') || code.includes('10')) iconHtml = '<i class="fas fa-cloud-rain"></i>';
                else if (code.includes('11')) iconHtml = '<i class="fas fa-bolt"></i>';
                else if (code.includes('13')) iconHtml = '<i class="fas fa-snowflake"></i>';
                else iconHtml = '<i class="fas fa-smog"></i>';
            } else {
                iconHtml = '<i class="fas fa-question-circle"></i>';
            }
            
            const tempDisplay = w ? w.temp : '--°C';
            const descDisplay = w ? w.desc : '暂无实时数据';
            // 穿衣建议保留静态（基于历史经验）
            let dressStatic = '';
            if (item.city === '伊宁') dressStatic = '长袖T恤+薄外套';
            else if (item.city === '赛里木湖') dressStatic = '冲锋衣+抓绒+手套';
            else if (item.city === '喀拉峻') dressStatic = '防风外套+帽子';
            else if (item.city === '琼库什台') dressStatic = '防水冲锋衣+徒步鞋';
            else if (item.city === '巩留') dressStatic = '软壳裤+长袖';
            else if (item.city === '库尔德宁') dressStatic = '抓绒+雨衣';
            else if (item.city === '那拉提') dressStatic = '羽绒内胆+墨镜';
            else dressStatic = '参考历史天气';
            
            html += `<div class="weather-item">
                <div class="weather-day">${item.city}</div>
                ${iconHtml}
                <div class="temp">${tempDisplay}</div>
                <div class="dress-tip">${descDisplay}<br>🧥 ${dressStatic}</div>
            </div>`;
        }
        container.innerHTML = html;
    }

        const timeDiff = Math.ceil((depDate - today) / (1000*3600*24));
        const alerts = [];
        if(timeDiff > 0) alerts.push({icon:"fa-hourglass-half", text:`距离出发还有 ${timeDiff} 天，请确认机票及租车订单`});
        else if(timeDiff === 0) alerts.push({icon:"fa-plane", text:"今日出发！祝旅途顺利"});
        else alerts.push({icon:"fa-check-circle", text:"行程进行中，注意当地天气变化"});
        const naranDate = new Date(refYear, 4, 2);
        if(today < naranDate && (naranDate - today) <= 7) alerts.push({icon:"fa-ticket-alt", text:"那拉提自驾票务必提前7天预约！今日可操作"});
        if(today >= new Date(refYear, 3, 25) && today < naranDate) alerts.push({icon:"fa-exclamation-triangle", text:"那拉提预约窗口开启，立即登录小程序购票"});
        alerts.push({icon:"fa-car", text:"库尔德宁/琼库山路窄弯多，谨慎驾驶"});
        if(today >= new Date(refYear, 3, 20) && today <= new Date(refYear, 4, 5)) alerts.push({icon:"fa-snowflake", text:"赛里木湖冰推季，南门附近最佳观赏"});
        return alerts.slice(0,5);
    }
    function renderAlerts() {
        const alerts = generateAlerts();
        document.getElementById('alertList').innerHTML = alerts.map(a => `<div class="alert-item"><i class="fas ${a.icon}"></i> ${a.text}</div>`).join('');
    }
    function renderChecklist() {
        const container = document.getElementById('checklist');
        container.innerHTML = checklistItems.map(item => `<div class="checklist-item"><i class="fas fa-check-circle" style="color:#4A7C59"></i> ${item}</div>`).join('');
    }
    function renderRouteSteps() {
        const nodes = [
            { name:"伊宁", type:"stay", label:"🏨 住宿" }, { name:"赛里木湖", type:"visit", label:"🎫 游玩" },
            { name:"特克斯", type:"stay2", label:"🏨 住宿2晚" }, { name:"喀拉峻", type:"visit", label:"🌿 游玩" },
            { name:"琼库什台", type:"stay", label:"🏨 住宿" }, { name:"巩留", type:"stay", label:"🏨 住宿" },
            { name:"库尔德宁", type:"visit", label:"⛰️ 游玩" }, { name:"新源", type:"stay", label:"🏨 住宿" },
            { name:"那拉提", type:"stay", label:"🏨 住宿" }
        ];
        const driveTimes = ["", "2h", "3.2h", "1h", "3h", "3h", "3h", "2h", "1.5h"];
        const container = document.getElementById('routeSteps');
        container.innerHTML = '';
        nodes.forEach((node, idx) => {
            const span = document.createElement('div');
            span.className = 'route-node';
            if(node.type === 'stay2') span.style.background = '#ffe4c4';
            else if(node.type === 'stay') span.style.background = '#e1f0fe';
            else span.style.background = '#e2f3db';
            span.innerHTML = `<strong>${node.name}</strong><small>${node.label}</small>`;
            container.appendChild(span);
            if(idx < nodes.length-1) {
                const arrow = document.createElement('div');
                arrow.className = 'route-arrow';
                arrow.innerHTML = `<i class="fas fa-arrow-right"></i><span class="drive-time">${driveTimes[idx+1]}</span>`;
                container.appendChild(arrow);
            }
        });
    }
    const spotInfoMap = {
        "松树头":"登高俯瞰赛湖全景，木栈道徒步约30分钟", "S弯公路":"公路大片经典机位", "点将台":"乌孙古迹，观日落", "果子沟大桥":"斜拉桥横跨峡谷",
        "鲜花台":"喀拉峻核心花海", "猎鹰台":"俯瞰峡谷雪山", "人体草原":"光影曲线摄影地", "琼库什台村":"原始哈萨克村落",
        "乌孙古道":"著名徒步路线", "齐梦德观景台":"270°雪山云杉", "游牧人家":"那拉提核心", "网红桥":"森林小桥", "空中草原":"海拔2200米草原",
        "喀赞其民俗街":"蓝色小镇", "伊宁市区（补给）":"采购物资"
    };
    function showSpotInfo(spot) { alert(`✨ ${spot}\n${spotInfoMap[spot] || '伊犁必去打卡地'}`); }
    function formatTransport(segments) {
        if(!segments) return '—';
        return segments.map(seg => `<div class="transport-line">${seg.mode === '飞机' ? '✈️' : '🚗'} ${seg.startTime} ${seg.from}出发 ——> ${seg.endTime} ${seg.to}到达（车程${seg.duration}）</div>`).join('');
    }
    function renderTimeline() {
        const timelineDiv = document.getElementById('timeline');
        const today = new Date();
        const refYear = 2026;
        timelineDiv.innerHTML = daysData.map((day, idx) => {
            const [month, dayNum] = day.date.replace('日','').split('月');
            const dayDate = new Date(refYear, parseInt(month)-1, parseInt(dayNum));
            const isToday = today.toDateString() === dayDate.toDateString();
            const spotsHtml = day.keySpots.map(spot => `<button class="btn-scene" data-spot="${spot}">📍 ${spot}</button>`).join('');
            const transportHtml = formatTransport(day.transportSegments);
            const mealsHtml = `<div class="meal-list"><div class="meal-item"><span class="meal-label">早餐：</span>${day.meals.breakfast}</div><div class="meal-item"><span class="meal-label">午餐：</span>${day.meals.lunch}</div><div class="meal-item"><span class="meal-label">晚餐：</span>${day.meals.dinner}</div></div>`;
            let extraReminder = "";
            if(day.urgentReminder) extraReminder = `<div class="reminder-warning"><i class="fas fa-bell"></i> ${day.urgentReminder}</div>`;
            if(day.reminder && !day.urgentReminder) extraReminder = `<div class="reminder-warning"><i class="fas fa-info-circle"></i> ${day.reminder}</div>`;
            return `<div class="day-card ${idx===0 ? 'open' : ''} ${isToday ? 'today-highlight' : ''}" data-day="${day.day}">
                        <div class="day-header"><div class="day-left"><div class="day-num">D${day.day}</div><div class="day-date">${day.date} ${day.weekday}</div><div class="theme-tag">${day.theme}</div></div><i class="fas fa-chevron-down toggle-icon"></i></div>
                        <div class="day-details"><div class="info-grid"><div class="info-item"><div class="info-label"><i class="fas fa-road"></i> 交通</div><div>${transportHtml}</div></div><div class="info-item"><div class="info-label"><i class="fas fa-map-marker-alt"></i> 核心日程</div><div>${day.core}</div><div style="margin-top:6px">${spotsHtml}</div></div><div class="info-item"><div class="info-label"><i class="fas fa-hotel"></i> 住宿 & 餐饮</div><div><strong>${day.hotel}</strong> ${day.hotelPrice}</div><div>🍽️ ${mealsHtml}</div></div><div class="info-item"><div class="info-label"><i class="fas fa-chart-simple"></i> 当日支出</div><div>🏨 ${day.fixedCostDay.accommodation?'¥'+day.fixedCostDay.accommodation:'无'} / 🎫 ${day.fixedCostDay.tickets?'¥'+day.fixedCostDay.tickets:'无'}</div>${day.ticketsNeed ? '<div>🎟️ 现场/预约购票</div>' : ''}</div></div>${extraReminder}</div></div>`;
        }).join('');
        document.querySelectorAll('.day-header').forEach(header => {
            header.addEventListener('click', (e) => { if(!e.target.classList.contains('btn-scene')) header.closest('.day-card').classList.toggle('open'); });
        });
        document.querySelectorAll('.btn-scene').forEach(btn => {
            btn.addEventListener('click', (e) => { e.stopPropagation(); showSpotInfo(btn.getAttribute('data-spot')); });
        });
    }
    async function init() {
        renderChecklist();
        renderRouteSteps();
        renderTimeline();
        renderAlerts();
        await renderWeather();  // 异步获取实时天气
    }
    init();
</script>
</body>
</html>
